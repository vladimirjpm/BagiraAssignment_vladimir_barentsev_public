# Runs the whole Scenario Builder stack: postgres + backend API + frontend (nginx).
# Start with:  docker compose up --build
# Then open:   http://localhost:8080
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scenariodb
      POSTGRES_USER: scenariouser
      POSTGRES_PASSWORD: scenariopass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scenariouser -d scenariodb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Storage__Provider=postgres
      - ConnectionStrings__Default=Host=postgres;Database=scenariodb;Username=scenariouser;Password=scenariopass
      # CORS is a safety net only — the frontend is served same-origin via nginx.
      - Cors__AllowedOrigins__0=http://localhost:8080
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/fronntend-react
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
